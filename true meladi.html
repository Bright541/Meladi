        /* Global styles */

        .song-item p,

        .song-item button,

        .recommended-item button {

            background-color: #1db954;

            color: white;

            border: none;

            cursor: pointer;

            border-radius: 50px;

            transition: background-color 0.3s;

        .song-item button:hover,

        }



        /* Hover effect for song items */

        /* Recommended Song Styling */

        }



        .recommended-item h3 {

            color: #1db954;

        /* Footer */

            padding: 20px;

        /* Artist row */

        /* Loading Spinner */

        .genre-item img {

    <script>
        // Function to create a new playlist
        function createPlaylist() {
            const playlistName = prompt('Enter the name of your new playlist:');
            if (playlistName) {
                const playlistList = document.getElementById('playlistList');
                const newPlaylist = document.createElement('div');
                newPlaylist.className = 'playlist-item';
                newPlaylist.innerHTML = `
                    <h4>${playlistName}</h4>
                    <button onclick="viewPlaylist('${playlistName}')">View Playlist</button>
                `;
                playlistList.appendChild(newPlaylist);
            }
        }
        // Mock function to handle viewing a playlist
        function viewPlaylist(playlistName) {
            alert(`Viewing playlist: ${playlistName}`);
        }
        // Function to show the notification
        function showNotification(message, success = true) {
            const notification = document.getElementById('notification');
            notification.classList.remove('success', 'error');
            notification.classList.add(success ? 'success' : 'error');
            notification.innerHTML = message;
            notification.style.display = 'block';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        // Improved search with delay
        let typingTimer;
        const typingInterval = 500; // Delay in ms (500ms delay after the last key press)
        function suggestSongs() {
            const searchQuery = document.getElementById('searchInput').value;
            const loadingSpinner = document.getElementById('loadingSpinner');
            const suggestonsContainer = document.getElementById('songsList');
            const recommendedContainer = document.getElementById('recommendedSongsList');
            const genreContainer = document.getElementById('genreList'); // Access the genre container
            // Show genres if search query is empty
            if (!searchQuery) {
                genreContainer.style.display = 'flex'; // Show genres container
                suggestionsContainer.innerHTML = '';  // Clear song suggestions
                recommendedContainer.innerHTML = ''; // Clear recommended songs
                return; // Stop further code execution
            }
            // Hide the genre container when a search query exists
            genreContainer.style.display = 'none';
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                if (!searchQuery) return;
                loadingSpinner.style.display = 'block';
                const apiUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(searchQuery)}&entity=song&limit=10`;
                fetch(apiUrl)
                    .then(response => response.json())
                    .then(data => {
                        suggestionsContainer.innerHTML = '';
                        recommendedContainer.innerHTML = '';
                        loadingSpinner.style.display = 'none';
                        if (data.results.length > 0) {
                            showNotification('Search Successful', true);
                            data.results.forEach(song => {
                                const songItem = document.createElement('div');
                                songItem.className = 'song-item';
                                songItem.innerHTML = `
                                    <img src="${song.artworkUrl100}" alt="${song.trackName}">
                                    <h3>${song.trackName}</h3>
                                    <p>${song.artistName}</p>
                                    <button onclick="window.location.href='${song.collectionViewUrl}'">Listen</button>
                                `;
                                suggestionsContainer.appendChild(songItem);
                            });
                        } else {
                            showNotification('No songs found. Please check your search query.', false);
                        }
                    })
                    .catch(() => {
                        showNotification('Error: Could not fetch data.', false);
                        loadingSpinner.style.display = 'none';
                    });
            }, typingInterval);
        }
        // Mock genre data (replace with real data if available)
        const genres = ['Rock', 'Pop', 'Jazz', 'Classical', 'Hip-Hop', 'Electronic', 'Country', 'Reggae', 'Blues'];
        const genreList = document.getElementById('genreList');
        genres.forEach(genre => {
            const genreItem = document.createElement('div');
            genreItem.className = 'genre-item';
            genreItem.innerHTML = `
                <img src="https://via.placeholder.com/150" alt="${genre}">
                <h3>${genre}</h3>
            `;
            genreList.appendChild(genreItem);
        });
    </script>
